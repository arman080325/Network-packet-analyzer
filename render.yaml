services:
  - type: web
    name: netscope-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: DEMO_PPS
        value: "18"
      - key: SYN_THRESHOLD
        value: "100"
      - key: PORT_SCAN_THRESHOLD
        value: "20"
